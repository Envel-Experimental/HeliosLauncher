name: Build and Release

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: write

env:
  BRANCH_NAME: ${{ github.ref_name }}
  COMMIT_SHA:  ${{ github.sha }}

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Cache electron-builder and node-gyp
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.electron
            ~/.electron-gyp
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron-builder
            ~\AppData\Local\electron-builder\cache
          key: electron-build-cache-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            electron-build-cache-${{ runner.os }}-

      - name: Disable Windows Defender
        if: runner.os == 'Windows'
        run: |
          Set-MpPreference -DisableRealtimeMonitoring $true
          Set-MpPreference -DisableIOAVProtection $true
        shell: pwsh

      - name: Install dependencies
        if: runner.os == 'Windows' || github.event.head_commit.message != '1'
        run: npm ci --no-audit --no-fund

      - name: Configure Network (Force IP & DNS)
        if: runner.os == 'macOS'
        run: |
          echo "89.23.113.35 f-launcher.ru" | sudo tee -a /etc/hosts

          echo "nameserver 8.8.8.8" | sudo tee /etc/resolv.conf
          
          echo "=== /etc/hosts content ==="
          cat /etc/hosts
          echo "=== Trying ping ==="
          ping -c 3 89.23.113.35 || true

      - name: Bundle Renderer
        if: runner.os == 'Windows' || github.event.head_commit.message != '1'
        run: npm run bundle

      - name: Prepare Release Name
        if: success() && (runner.os == 'Windows' || github.event.head_commit.message != '1')
        id: release_info
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "release=FLauncher@$VERSION+$SHA_SHORT" >> $GITHUB_OUTPUT

      - name: Upload to PostHog
        if: success() && runner.os == 'Linux' && github.event.head_commit.message != '1'
        continue-on-error: true
        uses: PostHog/upload-source-maps@v2.0.0
        with:
          directory: ./app/dist
          project-id: 166635
          api-key: ${{ secrets.POSTHOG_API_KEY }}
          host: https://eu.posthog.com
          release-name: ${{ steps.release_info.outputs.release }}
          release-version: ${{ github.sha }}

      - name: Build and Distribute
        if: runner.os == 'Windows' || github.event.head_commit.message != '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: "foxford-dc"
          SENTRY_PROJECT: "node"
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        shell: bash
        run: |
          # 1. Метаданные релиза
          VERSION=$(node -p "require('./package.json').version")
          
          # If on master and NOT a release commit, bump version for canary
          if [[ "$BRANCH_NAME" == "master" && "${{ github.event.head_commit.message }}" != "release" ]]; then
            # Simple bump: change 3.0.0 to 3.0.1-canary.RUN_ID
            BASE_VERSION=$(echo $VERSION | cut -d. -f1-2)
            PATCH_VERSION=$(echo $VERSION | cut -d. -f3)
            NEW_PATCH=$((PATCH_VERSION + 1))
            CANARY_VERSION="${BASE_VERSION}.${NEW_PATCH}-canary.${{ github.run_number }}"
            echo "Bumping version to $CANARY_VERSION for Canary build"
            npm version $CANARY_VERSION --no-git-tag-version
            VERSION=$CANARY_VERSION
          fi

          SHA_SHORT=$(git rev-parse --short HEAD)
          RELEASE_NAME="FLauncher@$VERSION+$SHA_SHORT"

          # 2. Sentry (Загружаем только с Linux, так как код идентичен)
          if [ "$RUNNER_OS" == "Linux" ]; then
            echo "Uploading to Sentry..."
            npx -y @sentry/cli sourcemaps upload ./app/dist ./app/assets/js \
              --release "$RELEASE_NAME" \
              --rewrite || echo "Sentry upload failed, but continuing..."
          fi

          # 3. Сборка дистрибутива
          if [ "$RUNNER_OS" == "macOS" ]; then
            export PATH="/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH"
          fi
          
          if [ "$RUNNER_OS" == "Linux" ]; then
            npm run dist -- --linux appimage snap deb rpm tar.gz
          elif [ "$RUNNER_OS" == "Windows" ]; then
            npm run dist -- --win
          elif [ "$RUNNER_OS" == "macOS" ]; then
            npm run dist -- --mac
          fi

      - name: Apply Staging Percentage from Commit
        if: success() && (runner.os == 'Windows' || github.event.head_commit.message != '1')
        shell: bash
        run: |
          MSG="${{ github.event.head_commit.message }}"
          if [[ "$MSG" =~ \[([0-9]+)%\] ]]; then
            PERCENT="${BASH_REMATCH[1]}"
            echo "Detected staging percentage: $PERCENT%"
            FILES=$(ls dist/latest*.yml 2>/dev/null || true)
            if [ -z "$FILES" ]; then
              echo "No latest*.yml files found."
            else
              for f in $FILES; do
                echo "stagingPercentage: $PERCENT" >> "$f"
              done
            fi
          fi

      - name: List dist (Linux/macOS)
        if: runner.os != 'Windows' && (runner.os == 'Windows' || github.event.head_commit.message != '1')
        run: ls -la dist

      - name: List dist (Windows)
        if: runner.os == 'Windows' && (runner.os == 'Windows' || github.event.head_commit.message != '1')
        run: Get-ChildItem dist
        shell: pwsh

      - name: Upload build artifacts
        if: runner.os == 'Windows' || github.event.head_commit.message != '1'
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ matrix.os }}
          compression-level: 0
          path: |
            dist/**/*.dmg
            dist/**/*.AppImage
            dist/**/*.deb
            dist/**/*.rpm
            dist/**/*.snap
            dist/**/*.flatpak
            dist/**/*.tar.gz
            dist/**/*.exe
            dist/**/*.blockmap
            dist/**/*.yml
          if-no-files-found: warn
          
  create_release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts from all jobs
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          if-no-files-found: ignore 

      - name: Decide tag / prerelease / names
        id: vars
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          COMMIT="${GITHUB_SHA}"

          if [[ "${{ github.event.head_commit.message }}" == "1" ]]; then
            echo "tag_name=test-compressed-${{ github.run_id }}" >> $GITHUB_OUTPUT
            echo "prerelease=true"                         >> $GITHUB_OUTPUT
            echo "release_name=Test Build (Compressed)"    >> $GITHUB_OUTPUT
          
          elif [[ "$BRANCH" == "master" && "${{ github.event.head_commit.message }}" == "release" ]]; then
            echo "tag_name=release-${{ github.run_id }}" >> $GITHUB_OUTPUT
            echo "prerelease=false"                 >> $GITHUB_OUTPUT
            echo "release_name=Release build [${COMMIT:0:7}]"         >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == "master" ]]; then
            echo "tag_name=prerelease-${{ github.run_id }}" >> $GITHUB_OUTPUT
            echo "prerelease=true"                         >> $GITHUB_OUTPUT
            echo "release_name=Prerelease build from master STABLE [${COMMIT:0:7}]" >> $GITHUB_OUTPUT
          else
            echo "tag_name=beta-${BRANCH}-${{ github.run_id }}" >> $GITHUB_OUTPUT
            echo "prerelease=true"                              >> $GITHUB_OUTPUT
            echo "release_name=Beta build from ${BRANCH} [${COMMIT:0:7}]"       >> $GITHUB_OUTPUT
          fi

          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1.14.0
        with:
          tag:  ${{ steps.vars.outputs.tag_name }}
          name: ${{ steps.vars.outputs.release_name }}
          prerelease: ${{ steps.vars.outputs.prerelease }}
          body: |
            **Branch**:  ${{ steps.vars.outputs.branch }}
            **Commit**:  ${{ steps.vars.outputs.commit }}
            
            Built automatically by workflow run ${{ github.run_id }}.
          artifacts: |
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.snap
            artifacts/**/*.flatpak
            artifacts/**/*.tar.gz
            artifacts/**/*.exe
            artifacts/**/*.blockmap
            artifacts/**/*.yml
          allowUpdates: true 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}