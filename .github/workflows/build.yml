name: Build and Release

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: write

env:
  BRANCH_NAME: ${{ github.ref_name }}
  COMMIT_SHA:  ${{ github.sha }}

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Cache electron-builder and node-gyp
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.electron
            ~/.electron-gyp
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron-builder
            ~\AppData\Local\electron-builder\cache
          key: electron-build-cache-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            electron-build-cache-${{ runner.os }}-

      - name: Disable Windows Defender
        if: runner.os == 'Windows'
        run: |
          Set-MpPreference -DisableRealtimeMonitoring $true
          Set-MpPreference -DisableIOAVProtection $true
        shell: pwsh

      - name: Install dependencies
        if: runner.os == 'Windows' || github.event.head_commit.message != '1'
        run: npm ci --no-audit --no-fund

      - name: Configure Network (Force IP & DNS)
        if: runner.os == 'macOS'
        run: |
          echo "89.23.113.35 f-launcher.ru" | sudo tee -a /etc/hosts

          echo "nameserver 8.8.8.8" | sudo tee /etc/resolv.conf
          
          echo "=== /etc/hosts content ==="
          cat /etc/hosts
          echo "=== Trying ping ==="
          ping -c 3 89.23.113.35 || true

      - name: Build and Upload
        if: runner.os == 'Windows' || github.event.head_commit.message != '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          GIT_BRANCH: ${{ env.BRANCH_NAME }}
          GIT_SHA:    ${{ env.COMMIT_SHA }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        shell: bash
        run: |
      - name: Build and Distribute
        if: runner.os == 'Windows' || github.event.head_commit.message != '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: "foxford-dc"
          SENTRY_PROJECT: "node"
        shell: bash
        run: |
          # 1. Сборка фронтенда
          npm run bundle
          
          # 2. Метаданные релиза
          VERSION=$(node -p "require('./package.json').version")
          SHA_SHORT=$(git rev-parse --short HEAD)
          RELEASE_NAME="FLauncher@$VERSION+$SHA_SHORT"
          echo "Processing release: $RELEASE_NAME"

          # 3. PostHog (используем их официальный скрипт напрямую)
          echo "Uploading to PostHog..."
          curl -sL https://raw.githubusercontent.com/PostHog/upload-source-maps/main/dist/index.js -o posthog-upload.js
          
          # Настраиваем переменные для скрипта (имитируем входные данные экшена)
          export INPUT_PATH="./app/dist"
          export INPUT_PROJECT_ID="166635"
          export INPUT_API_KEY="$POSTHOG_API_KEY"
          export INPUT_HOST="https://eu.posthog.com"
          export INPUT_RELEASE_NAME="$RELEASE_NAME"
          export INPUT_RELEASE_VERSION="${{ github.sha }}"
          
          node posthog-upload.js || echo "PostHog upload failed, but continuing..."

          # 4. Sentry (через CLI, без смены версии Node)
          echo "Uploading to Sentry..."
          npx -y @sentry/cli sourcemaps upload ./app/dist ./app/assets/js \
            --release "$RELEASE_NAME" \
            --rewrite || echo "Sentry upload failed, but continuing..."

          # 5. Сборка дистрибутива
          if [ "$RUNNER_OS" == "macOS" ]; then
            export PATH="/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH"
          fi
          
          if [ "$RUNNER_OS" == "Linux" ]; then
            npm run dist -- --linux appimage snap deb rpm tar.gz
          elif [ "$RUNNER_OS" == "Windows" ]; then
            npm run dist -- --win
          elif [ "$RUNNER_OS" == "macOS" ]; then
            npm run dist -- --mac
          fi

          # 5. Сборка дистрибутива (Mac билд не падает, если всё в одном шаге)
          if [ "$RUNNER_OS" == "Linux" ]; then
            npm run dist -- --linux appimage snap deb rpm tar.gz
          elif [ "$RUNNER_OS" == "Windows" ]; then
            npm run dist -- --win
          elif [ "$RUNNER_OS" == "macOS" ]; then
            npm run dist -- --mac
          fi

        
      - name: List dist (Linux/macOS)
        if: runner.os != 'Windows' && (runner.os == 'Windows' || github.event.head_commit.message != '1')
        run: ls -la dist

      - name: List dist (Windows)
        if: runner.os == 'Windows' && (runner.os == 'Windows' || github.event.head_commit.message != '1')
        run: Get-ChildItem dist
        shell: pwsh

      - name: Upload build artifacts
        if: runner.os == 'Windows' || github.event.head_commit.message != '1'
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ matrix.os }}
          compression-level: 0
          path: |
            dist/**/*.dmg
            dist/**/*.AppImage
            dist/**/*.deb
            dist/**/*.rpm
            dist/**/*.snap
            dist/**/*.flatpak
            dist/**/*.tar.gz
            dist/**/*.exe
            dist/**/*.blockmap
            dist/**/*.yml
          if-no-files-found: warn
          
  create_release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts from all jobs
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          if-no-files-found: ignore 

      - name: Decide tag / prerelease / names
        id: vars
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          COMMIT="${GITHUB_SHA}"

          if [[ "${{ github.event.head_commit.message }}" == "1" ]]; then
            echo "tag_name=test-compressed-${{ github.run_id }}" >> $GITHUB_OUTPUT
            echo "prerelease=true"                         >> $GITHUB_OUTPUT
            echo "release_name=Test Build (Compressed)"    >> $GITHUB_OUTPUT
          
          elif [[ "$BRANCH" == "master" && "${{ github.event.head_commit.message }}" == "release" ]]; then
            echo "tag_name=release-${{ github.run_id }}" >> $GITHUB_OUTPUT
            echo "prerelease=false"                 >> $GITHUB_OUTPUT
            echo "release_name=Release build"         >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == "master" ]]; then
            echo "tag_name=prerelease-${{ github.run_id }}" >> $GITHUB_OUTPUT
            echo "prerelease=true"                         >> $GITHUB_OUTPUT
            echo "release_name=Prerelease build from master" >> $GITHUB_OUTPUT
          else
            echo "tag_name=beta-${BRANCH}-${{ github.run_id }}" >> $GITHUB_OUTPUT
            echo "prerelease=true"                              >> $GITHUB_OUTPUT
            echo "release_name=Beta build from ${BRANCH}"       >> $GITHUB_OUTPUT
          fi

          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1.14.0
        with:
          tag:  ${{ steps.vars.outputs.tag_name }}
          name: ${{ steps.vars.outputs.release_name }}
          prerelease: ${{ steps.vars.outputs.prerelease }}
          body: |
            **Branch**:  ${{ steps.vars.outputs.branch }}
            **Commit**:  ${{ steps.vars.outputs.commit }}
            
            Built automatically by workflow run ${{ github.run_id }}.
          artifacts: |
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.snap
            artifacts/**/*.flatpak
            artifacts/**/*.tar.gz
            artifacts/**/*.exe
            artifacts/**/*.blockmap
            artifacts/**/*.yml
          allowUpdates: true 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}