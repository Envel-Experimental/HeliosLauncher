name: Manual Sentry Upload

on:
  # Allows you to run this workflow manually from the "Actions" tab on GitHub
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (must match package.json, e.g., 2.3.7)'
        required: true
        default: '2.3.7'

jobs:
  upload_source:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # 1. Check out the code from the current branch.
      # IMPORTANT: Ensure the code in this branch matches the code in the .exe/.asar exactly.
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Upload source files to Bugsink
      - name: Upload to Bugsink
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.BUGSINK_AUTH_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"
          RELEASE_NAME="FLauncher@$VERSION"
          
          echo "Uploading to Bugsink (Release: $RELEASE_NAME)..."
          
          npx -y @sentry/cli --url https://flauncher.bugsink.com/ sourcemaps upload ./ \
            --org bugsinkhasnoorgs \
            --project ignoredfornow \
            --release "$RELEASE_NAME" \
            --rewrite \
            --ignore-missing